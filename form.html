<!DOCTYPE html>
<html lang="en">
<head>
<meta name="description" content="A product review form to submit ratings, feedback, and reviews for different products.">
<meta name="author" content="Osagie john">
<title>Product Review</title>
<link rel="stylesheet" href="styles/style.css">
<script defer src="scripts/script.js"></script>
</head>

<body>
<header>
  <h1>Product Review Form</h1>
</header>


<form method="get" action="review.html">

<!-- Product Name -->
<label for="product">Product Name *</label>
<select id="product" name="product" required>
    <option value="" disabled selected>Select a Product ...</option>
</select>

<!-- Rating -->
 <p>Overall Rating *</p>

<input type="radio" id="rate1" name="rating" value="1" required>
<label for="rate1">1 ⭐</label>

<input type="radio" id="rate2" name="rating" value="2">
<label for="rate2">2 ⭐</label>

<input type="radio" id="rate3" name="rating" value="3">
<label for="rate3">3 ⭐</label>

<input type="radio" id="rate4" name="rating" value="4">
<label for="rate4">4 ⭐</label>

<input type="radio" id="rate5" name="rating" value="5">
<label for="rate5">5 ⭐</label>

<!-- Date -->
<label for="date">Date of Installation *</label>
<input type="date" id="date" name="date" required>

<!-- Features -->


<p>Useful Features</p>

<input type="checkbox" id="feature1" name="features" value="fast">
<label for="feature1">Fast</label>

<input type="checkbox" id="feature2" name="features" value="durable">
<label for="feature2">Durable</label>

<input type="checkbox" id="feature3" name="features" value="easy">
<label for="feature3">Easy to Use</label>

<input type="checkbox" id="feature4" name="features" value="portable">
<label for="feature4">Portable</label>

<!-- Review -->
<label for="review">Written Review</label>
<textarea id="review" name="review"></textarea>

<!-- Name -->
<label for="username">Your Name</label>
<input type="text" id="username" name="username">

<!-- Submit -->
<input type="submit" value="Submit Review">

</form>

<footer>
<p>© 2026 Product Reviews</p>
</footer>

</body>
</html>
