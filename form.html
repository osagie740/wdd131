<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Review</title>
<link rel="stylesheet" href="styles/style.css">
<script defer src="scripts/script.js"></script>
</head>

<body>

<h1>Product Review Form</h1>

<form method="get" action="review.html">

<!-- Product Name -->
<label for="product">Product Name *</label>
<select id="product" name="product" required>
    <option value="" disabled selected>Select a Product ...</option>
</select>

<!-- Rating -->
<p>Overall Rating *</p>

<label><input type="radio" name="rating" value="1" required> 1 ⭐</label>
<label><input type="radio" name="rating" value="2"> 2 ⭐</label>
<label><input type="radio" name="rating" value="3"> 3 ⭐</label>
<label><input type="radio" name="rating" value="4"> 4 ⭐</label>
<label><input type="radio" name="rating" value="5"> 5 ⭐</label>

<!-- Date -->
<label for="date">Date of Installation *</label>
<input type="date" id="date" name="date" required>

<!-- Features -->
<p>Useful Features</p>

<label><input type="checkbox" name="features" value="fast"> Fast</label>
<label><input type="checkbox" name="features" value="durable"> Durable</label>
<label><input type="checkbox" name="features" value="easy"> Easy to Use</label>

<!-- Review -->
<label for="review">Written Review</label>
<textarea id="review" name="review"></textarea>

<!-- Name -->
<label for="username">Your Name</label>
<input type="text" id="username" name="username">

<!-- Submit -->
<input type="submit" value="Submit Review">

</form>

<footer>
<p>© 2026 Product Reviews</p>
</footer>

</body>
</html>
